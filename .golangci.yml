version: "2"

linters:
  default: standard
  enable:
    - copyloopvar
    - dupl
    - dupword
    - errname
    - errorlint
    - fatcontext
    - forcetypeassert
    - goconst
    - gocritic
    - gocognit
    - gocyclo
    - intrange
    - misspell
    - modernize
    - nakedret
    - nilerr
    - nilnil
    - perfsprint
    - prealloc
    - predeclared
    - recvcheck
    - thelper
    - unconvert
    - unparam
    - usestdlibvars
    - lll
    - wastedassign
    - whitespace

linters-settings:
  gocognit:
    min-complexity: 15
  lll:
    line-length: 120
  dupl:
    threshold: 150
  revive:
    rules:
      - name: unused-parameter
        disabled: true
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true

exclusions:
  presets:
    - std-error-handling
    - common-false-positives
  rules:
    - path: "_test\\.go"
      linters:
        - gosec
        - goconst
        - gocognit

formatters:
  enable:
    - gofmt
