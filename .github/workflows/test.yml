name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Run tests
        run: go test ./...

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "ERROR: Coverage ${COVERAGE}% is below the required 80% threshold."
            exit 1
          fi
          echo "Coverage check passed: ${COVERAGE}%"

  # Gate job for branch protection — passes when all jobs pass or are correctly skipped.
  # Required because GitHub treats skipped required checks as "not satisfied".
  ci:
    runs-on: ubuntu-latest
    name: CI
    needs: [lint, test, coverage]
    if: always()
    steps:
      - name: Check results
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          COVERAGE: ${{ needs.coverage.result }}
        run: |
          for r in "$LINT" "$TEST" "$COVERAGE"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "Job failed with result: $r"
              exit 1
            fi
          done
